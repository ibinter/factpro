<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#002D5B">
    <title>Hors connexion — IBIG FactPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(160deg, #0353A4 0%, #002D5B 55%, #001B38 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            width: 100%;
        }
        .logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 28px;
            border-radius: 22px;
            background: linear-gradient(180deg, #0062CC, #002D5B);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            position: relative;
        }
        /* Lettre F géométrique en CSS */
        .logo .f-v  { position: absolute; left: 26px; top: 20px; width: 14px; height: 56px; background: #fff; }
        .logo .f-t  { position: absolute; left: 26px; top: 20px; width: 42px; height: 14px; background: #fff; }
        .logo .f-m  { position: absolute; left: 26px; top: 44px; width: 34px; height: 12px; background: #F0C040; }
        .logo .qr   { position: absolute; right: 16px; bottom: 16px; width: 16px; height: 16px; background: #F0C040; }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        p {
            font-size: 0.98rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.82);
            margin-bottom: 30px;
        }
        button {
            font: inherit;
            font-weight: 600;
            color: #002D5B;
            background: #F0C040;
            border: none;
            border-radius: 10px;
            padding: 13px 34px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s ease, filter 0.15s ease;
        }
        button:hover { filter: brightness(1.06); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .brand {
            margin-top: 36px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo" aria-hidden="true">
            <span class="f-v"></span>
            <span class="f-t"></span>
            <span class="f-m"></span>
            <span class="qr"></span>
        </div>
        <h1>Vous êtes hors connexion</h1>
        <p>IBIG FactPro nécessite une connexion pour synchroniser vos données. Vos données sont en sécurité&nbsp;— reconnectez-vous pour continuer.</p>
        <button type="button" onclick="location.reload()">Réessayer</button>
        <div class="brand">IBIG FactPro</div>
    </div>
</body>
</html>
