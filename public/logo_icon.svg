<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="ig3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0062CC"/>
      <stop offset="100%" stop-color="#001A3A"/>
    </linearGradient>
    <linearGradient id="gg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C88000"/>
    </linearGradient>
    <filter id="gl3"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sh3"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000050"/></filter>
  </defs>

  <!-- Fond -->
  <rect x="4" y="4" width="152" height="152" rx="32" fill="url(#ig3)" filter="url(#sh3)"/>

  <!-- Reflet haut -->
  <rect x="4" y="4" width="152" height="60" rx="32" fill="#ffffff" opacity="0.06"/>

  <!-- Coins QR -->
  <rect x="16" y="16" width="28" height="5" rx="2.5" fill="url(#gg3)"/>
  <rect x="16" y="16" width="5" height="28" rx="2.5" fill="url(#gg3)"/>
  <rect x="116" y="16" width="28" height="5" rx="2.5" fill="url(#gg3)"/>
  <rect x="139" y="16" width="5" height="28" rx="2.5" fill="url(#gg3)"/>
  <rect x="16" y="139" width="28" height="5" rx="2.5" fill="url(#gg3)"/>
  <rect x="16" y="116" width="5" height="28" rx="2.5" fill="url(#gg3)"/>
  <rect x="116" y="139" width="28" height="5" rx="2.5" fill="url(#gg3)"/>
  <rect x="139" y="116" width="5" height="28" rx="2.5" fill="url(#gg3)"/>

  <!-- F géométrique moderne -->
  <rect x="36" y="30" width="13" height="100" rx="6" fill="#ffffff" filter="url(#gl3)"/>
  <rect x="36" y="30" width="70" height="13" rx="6" fill="#ffffff"/>
  <rect x="36" y="74" width="52" height="12" rx="5" fill="url(#gg3)"/>

  <!-- Éclair (vitesse / facturation instantanée) -->
  <polygon points="100,36 82,84 95,84 76,124 122,74 106,74 122,36" fill="url(#gg3)" filter="url(#gl3)"/>

  <!-- Cellule QR centrale bas -->
  <rect x="56" y="116" width="22" height="22" rx="5" fill="url(#gg3)" opacity="0.85"/>
  <rect x="62" y="122" width="10" height="10" rx="3" fill="#001A3A"/>

  <!-- Bordure subtile -->
  <rect x="4" y="4" width="152" height="152" rx="32" fill="none" stroke="url(#gg3)" stroke-width="1.5" opacity="0.3"/>
</svg>
