<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactPro SDK — Exemple Navigateur</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #4f46e5; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 600; font-size: 0.875rem; }
        input { display: block; width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; box-sizing: border-box; }
        button { background: #4f46e5; color: #fff; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        button:hover { background: #4338ca; }
        pre { background: #1e293b; color: #86efac; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; white-space: pre-wrap; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <h1>FactPro JS SDK — Demo</h1>

    <label for="apiKey">Clé API</label>
    <input id="apiKey" type="password" placeholder="Votre token Sanctum" />

    <label for="baseUrl">URL de l'instance</label>
    <input id="baseUrl" type="url" value="https://app.factpro.ibigsoft.com" />

    <button id="btnTest">Tester la connexion</button>
    <button id="btnInvoices" style="margin-left: 0.5rem">Lister les factures</button>
    <button id="btnCustomers" style="margin-left: 0.5rem">Lister les clients</button>

    <pre id="output">Entrez votre clé API et cliquez sur un bouton…</pre>

    <script type="module">
        // Import depuis l'URL du CDN (exemple) ou un bundler
        // En production : import { FactProClient } from '@ibigsoft/factpro-sdk';
        // Ici, on simule l'import en chargeant le SDK local (adapté si servi localement)

        const output = document.getElementById('output');

        function getClient() {
            const apiKey  = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim();
            if (!apiKey) throw new Error('Veuillez entrer une clé API.');
            // Inline minimal client pour démo browser sans bundler
            return { apiKey, baseUrl };
        }

        async function apiFetch(client, path, method = 'GET', body = null) {
            const opts = {
                method,
                headers: {
                    'Authorization': `Bearer ${client.apiKey}`,
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                },
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(`${client.baseUrl}/api${path}`, opts);
            return res.json();
        }

        document.getElementById('btnTest').addEventListener('click', async () => {
            try {
                const client = getClient();
                output.textContent = 'Connexion en cours…';
                const data = await apiFetch(client, '/v1/me');
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.innerHTML = `<span class="error">Erreur : ${e.message}</span>`;
            }
        });

        document.getElementById('btnInvoices').addEventListener('click', async () => {
            try {
                const client = getClient();
                output.textContent = 'Chargement des factures…';
                const data = await apiFetch(client, '/v1/documents?type=invoice&page=1');
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.innerHTML = `<span class="error">Erreur : ${e.message}</span>`;
            }
        });

        document.getElementById('btnCustomers').addEventListener('click', async () => {
            try {
                const client = getClient();
                output.textContent = 'Chargement des clients…';
                const data = await apiFetch(client, '/v1/customers?page=1');
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.innerHTML = `<span class="error">Erreur : ${e.message}</span>`;
            }
        });
    </script>
</body>
</html>
